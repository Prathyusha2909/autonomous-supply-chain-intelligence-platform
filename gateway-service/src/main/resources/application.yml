server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${FRONTEND_ORIGINS:http://localhost:5173}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: shipment-service
          uri: ${SHIPMENT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/shipments/**
        - id: intelligence-service
          uri: ${INTELLIGENCE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/intelligence/**,/api/copilot/**

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: gateway-service
