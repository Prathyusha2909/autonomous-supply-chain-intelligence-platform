server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: intelligence-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/intelligence}
    username: ${SPRING_DATASOURCE_USERNAME:intelligence}
    password: ${SPRING_DATASOURCE_PASSWORD:intelligence}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.autonomous.supplychain.common.events,com.autonomous.supplychain.common.model
        spring.json.value.default.type: com.autonomous.supplychain.common.events.ShipmentEvent
        spring.json.use.type.headers: false

app:
  kafka:
    group-id: intelligence-service
  ai:
    provider: ${AI_PROVIDER:none}
    openai:
      api-key: ${OPENAI_API_KEY:}
      endpoint: ${OPENAI_API_ENDPOINT:https://api.openai.com/v1/responses}
      model: ${OPENAI_MODEL:gpt-5.5}
      max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:700}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      endpoint: ${ANTHROPIC_API_ENDPOINT:https://api.anthropic.com/v1/messages}
      model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
      version: ${ANTHROPIC_VERSION:2023-06-01}
      max-tokens: ${ANTHROPIC_MAX_TOKENS:700}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: intelligence-service
