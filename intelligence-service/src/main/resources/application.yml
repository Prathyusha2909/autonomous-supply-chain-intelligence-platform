server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: intelligence-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/intelligence}
    username: ${SPRING_DATASOURCE_USERNAME:intelligence}
    password: ${SPRING_DATASOURCE_PASSWORD:intelligence}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.autonomous.supplychain.common.events,com.autonomous.supplychain.common.model
        spring.json.value.default.type: com.autonomous.supplychain.common.events.ShipmentEvent
        spring.json.use.type.headers: false

app:
  kafka:
    group-id: intelligence-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: intelligence-service
