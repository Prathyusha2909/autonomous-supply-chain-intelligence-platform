apiVersion: v1
kind: Service
metadata:
  name: event-simulator
  namespace: supply-chain-intelligence
spec:
  selector:
    app: event-simulator
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-simulator
  namespace: supply-chain-intelligence
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-simulator
  template:
    metadata:
      labels:
        app: event-simulator
    spec:
      containers:
        - name: event-simulator
          image: supply-chain/event-simulator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: SIMULATOR_FIXED_DELAY_MS
              value: "5000"
          envFrom:
            - configMapRef:
                name: platform-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
