global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway-service:8080"]

  - job_name: shipment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["shipment-service:8081"]

  - job_name: intelligence-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["intelligence-service:8082"]

  - job_name: event-simulator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["event-simulator:8083"]
