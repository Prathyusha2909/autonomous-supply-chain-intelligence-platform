<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title">
  <title id="title">Swagger OpenAPI UI preview</title>
  <rect width="1280" height="720" fill="#eef4f1"/>
  <rect x="56" y="46" width="1168" height="628" rx="8" fill="#ffffff" stroke="#d2ded9"/>
  <rect x="56" y="46" width="1168" height="74" rx="8" fill="#17382f"/>
  <text x="92" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="800" fill="#ffffff">Swagger UI - Supply Chain APIs</text>
  <text x="92" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#16242b">Shipment Service</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="16">
    <rect x="92" y="182" width="1050" height="48" rx="6" fill="#e8f3ff" stroke="#96c6ee"/>
    <text x="112" y="213" font-weight="800" fill="#0b5c8f">GET</text><text x="176" y="213" fill="#16242b">/api/shipments</text>
    <rect x="92" y="242" width="1050" height="48" rx="6" fill="#e8f8ee" stroke="#9ad4b0"/>
    <text x="112" y="273" font-weight="800" fill="#1f7a44">POST</text><text x="176" y="273" fill="#16242b">/api/shipments</text>
    <rect x="92" y="302" width="1050" height="48" rx="6" fill="#e8f8ee" stroke="#9ad4b0"/>
    <text x="112" y="333" font-weight="800" fill="#1f7a44">POST</text><text x="176" y="333" fill="#16242b">/api/shipments/{shipmentId}/events</text>
  </g>
  <text x="92" y="394" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#16242b">Intelligence Service</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="16">
    <rect x="92" y="420" width="1050" height="48" rx="6" fill="#e8f3ff" stroke="#96c6ee"/>
    <text x="112" y="451" font-weight="800" fill="#0b5c8f">GET</text><text x="176" y="451" fill="#16242b">/api/intelligence/risks?threshold=0.45</text>
    <rect x="92" y="480" width="1050" height="48" rx="6" fill="#e8f3ff" stroke="#96c6ee"/>
    <text x="112" y="511" font-weight="800" fill="#0b5c8f">GET</text><text x="176" y="511" fill="#16242b">/api/intelligence/bottlenecks</text>
    <rect x="92" y="540" width="1050" height="48" rx="6" fill="#e8f8ee" stroke="#9ad4b0"/>
    <text x="112" y="571" font-weight="800" fill="#1f7a44">POST</text><text x="176" y="571" fill="#16242b">/api/copilot/query</text>
  </g>
  <text x="92" y="632" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#66756f">Available at /swagger-ui.html on each Spring service after startup.</text>
</svg>
