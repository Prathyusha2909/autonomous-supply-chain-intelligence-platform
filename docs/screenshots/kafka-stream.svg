<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title">
  <title id="title">Kafka shipment event stream preview</title>
  <rect width="1280" height="720" fill="#101820"/>
  <rect x="36" y="36" width="1208" height="648" rx="10" fill="#151f27" stroke="#2b3b45"/>
  <text x="64" y="82" font-family="Consolas, monospace" font-size="20" fill="#7fe7c4">kafka-console-consumer --topic shipment.events --bootstrap-server localhost:9092</text>
  <line x1="64" y1="110" x2="1216" y2="110" stroke="#2b3b45"/>
  <g font-family="Consolas, monospace" font-size="17">
    <text x="64" y="154" fill="#d7f7ee">{"eventType":"SHIPMENT_CREATED","shipmentId":"SHP-8F2A91CD","carrier":"Maersk","origin":"Shanghai, CN","destination":"Los Angeles, US"}</text>
    <text x="64" y="202" fill="#d7f7ee">{"eventType":"LOCATION_UPDATED","shipmentId":"SHP-8F2A91CD","currentLocation":{"name":"Port of Singapore","latitude":1.2644,"longitude":103.82}}</text>
    <text x="64" y="250" fill="#ffd48a">{"eventType":"EXCEPTION_RAISED","shipmentId":"SHP-8F2A91CD","severity":"HIGH","exceptionCode":"PORT_CONGESTION","dwellMinutes":420}</text>
    <text x="64" y="298" fill="#d7f7ee">{"eventType":"ETA_REVISED","shipmentId":"SHP-8F2A91CD","plannedEta":"2026-07-05T16:00:00Z","predictedEta":"2026-07-06T03:30:00Z"}</text>
  </g>
  <rect x="64" y="346" width="520" height="124" rx="8" fill="#1d2b34" stroke="#38505d"/>
  <text x="92" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#fff">Topic health</text>
  <text x="92" y="426" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#9fb4bd">shipment.events partitions: 6</text>
  <text x="92" y="454" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#9fb4bd">consumer group: intelligence-service</text>
  <rect x="626" y="346" width="520" height="124" rx="8" fill="#1d2b34" stroke="#38505d"/>
  <text x="654" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#fff">Pipeline proof</text>
  <text x="654" y="426" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#9fb4bd">Event emitted by shipment-service</text>
  <text x="654" y="454" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#9fb4bd">Risk profile updated by intelligence-service</text>
  <text x="64" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#8aa0aa">Replace this preview with a terminal screenshot after running docker compose locally.</text>
